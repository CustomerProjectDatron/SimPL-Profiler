<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b28"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e9bff"/>
      <stop offset="100%" stop-color="#3a60cc"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aaeff"/>
      <stop offset="100%" stop-color="#4e7aff"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e7aff"/>
      <stop offset="100%" stop-color="#2a4db0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="64" height="64" rx="12" ry="12" fill="none" stroke="#252d45" stroke-width="1.5"/>

  <!-- Baseline -->
  <line x1="9" y1="50" x2="55" y2="50" stroke="#2e3a5a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Profiler bars (flame-chart / performance bars style) -->
  <!-- Bar 1 -->
  <rect x="10" y="36" width="7" height="14" rx="2" fill="url(#bar3)" filter="url(#glow)"/>

  <!-- Bar 2 -->
  <rect x="20" y="22" width="7" height="28" rx="2" fill="url(#bar2)" filter="url(#glow)"/>

  <!-- Bar 3 (tallest / highlight) -->
  <rect x="30" y="14" width="7" height="36" rx="2" fill="url(#bar1)" filter="url(#glow)"/>

  <!-- Bar 4 -->
  <rect x="40" y="28" width="7" height="22" rx="2" fill="url(#bar2)" filter="url(#glow)"/>

  <!-- Bar 5 -->
  <rect x="50" y="40" width="5" height="10" rx="2" fill="url(#bar3)" filter="url(#glow)"/>

  <!-- Tick mark / cursor line on tallest bar -->
  <line x1="33.5" y1="11" x2="33.5" y2="14" stroke="#8aaeff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="33.5" cy="10" r="2" fill="#8aaeff"/>
</svg>
